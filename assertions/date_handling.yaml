- id: no_created_at_for_revenue
  description: "Revenue queries should use recognized_at not created_at"
  trigger:
    sql_references_any:
      - "amount"
      - "net_revenue"
      - "recognized_revenue"
    question_contains_any:
      - "revenue"
      - "recognized"
  assert:
    sql_excludes_column: "amount"
  severity: warning
  failure_mode: COLUMN_SUBSTITUTION
